# SECRETS: this file must never contain literal passwords — only ${VAR} references.
# Real values live in ~/stack/.env on cortex ONLY (never on the /mnt/shared/claudia/magiq NAS
# share this file is mirrored from/to). Compose auto-substitutes ${VAR} from a .env file in the
# same directory as this one at parse time — no code change needed beyond keeping that .env
# populated. Vars used here: MYSQL_ROOT_PASSWORD, MSSQL_SA_PASSWORD, CIFS_SHARED_PASSWORD.
# Added 2026-07-05 specifically so this file is safe to edit/share with an AI assistant without
# ever exposing real secrets — see decisions/log.md and setup guide Stage 22.
x-logging: &default-logging
  logging:
   driver: json-file
   options:
     max-size: "10m"
     max-file: "3"

services:
  # ── Authentik — identity provider / SSO ─────────────────────────────────
  # Single identity for the tailnet admin fleet. Two integration modes:
  #  1. Forward-auth, DOMAIN-LEVEL (embedded outpost) — a SINGLE Authentik proxy
  #     provider (Forward auth → domain level, cookie domain ramonedevelopment.com)
  #     bound to the embedded outpost gates every host carrying the
  #     `authentik@docker` middleware, with one shared session cookie. Wired
  #     below on homepage, redis-stack (RedisInsight) and the traefik dashboard —
  #     the UIs with no login of their own. Add the middleware line to any other
  #     host to extend the gate. REQUIRES the tailnet entrypoint on :443 (done):
  #     domain-level is broken on non-443 ports (authentik #12503).
  #  2. Native OIDC for apps that already have their own user DB (portainer,
  #     seq, open-webui, cloudbeaver, uptime-kuma) — configured per-app in the
  #     Authentik UI after first boot, NOT here (needs providers minted first).
  #     OIDC + the shared domain cookie is what makes those apps seamless (no
  #     second login) rather than gating them with forward-auth on top.
  #  3. tower is the exception to the domain-level group: it's forward-auth'd
  #     SINGLE-APPLICATION (own `tower-fwd` provider + `tower-users` group
  #     policy) because it's the one host exposed to the PUBLIC internet
  #     (websecure entrypoint, router-forwarded). See the tower block. authentik
  #     (login.) is also on websecure so public visitors can reach the login.
  # Deliberately NOT protected: mcp-azure-devops (machine API — a browser
  # redirect breaks the MCP client), netdata (network_mode: host, bypasses
  # Traefik entirely). Everything except tower + login stays tailnet-only.
  # See decisions/log.md (2026-07-13/14).
  authentik-postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *default-logging
    environment:
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - authentik_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Authentik hard-requires PostgreSQL; the stack had none (only mysql +
    # mssql), so this is a dedicated instance for Authentik only. Redis is NOT
    # dedicated — Authentik reuses the existing redis-stack (DB 0), which
    # nothing else in the stack wires an app to.

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.12}
    restart: unless-stopped
    <<: *default-logging
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      AUTHENTIK_REDIS__HOST: redis-stack
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: chase.ramone@magiqsoftware.com
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    ports:
      # HOST-LOOPBACK ONLY — never tailscale/public. Exists solely so the
      # forward-auth middleware below can reach the embedded outpost. traefik
      # runs network_mode: host, so it is NOT on the compose bridge network and
      # CANNOT resolve `authentik-server` by Docker service name for the
      # forward-auth sub-request (unlike normal UI routing, where Traefik's
      # docker provider dials the container's bridge IP directly). Publishing
      # 9000 on 127.0.0.1 puts it on the host loopback that host-net Traefik
      # shares, so `http://127.0.0.1:9000/...` resolves. Portainer's 9000 is
      # container-internal (bridge) and never host-published, so no collision.
      - "127.0.0.1:9000:9000"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`login.ramonedevelopment.com`)"
      # tailnet + PUBLIC (websecure): the IdP must be internet-reachable because
      # public visitors to tower.ramonedevelopment.com get redirected here to log
      # in. Exposing the login UI publicly is inherent to gating a public app —
      # harden it (strong akadmin password + MFA, brute-force/reputation policy).
      - "traefik.http.routers.authentik.entrypoints=tailnet,websecure"
      - "traefik.http.routers.authentik.tls.certresolver=public"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      # ── Reusable forward-auth middleware (embedded outpost). Defined once
      #    here; attached to protected routers by name `authentik@docker`.
      #    DOMAIN-LEVEL: one Proxy Provider (Forward auth → domain level, cookie
      #    domain ramonedevelopment.com, external host https://login.ramonedevelopment.com)
      #    bound to the embedded outpost covers every host carrying this
      #    middleware. Works because the tailnet entrypoint is :443 (bare Host
      #    header, no port) — see #12503 note in the header comment. Inert until
      #    that provider + application exist in the Authentik UI.
      - "traefik.http.middlewares.authentik.forwardauth.address=http://127.0.0.1:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version,X-authentik-entitlements"
      - "homepage.group=Ops"
      - "homepage.name=Authentik"
      - "homepage.icon=authentik.png"
      - "homepage.href=https://login.ramonedevelopment.com"
      - "homepage.description=Identity provider / SSO"
    # login.ramonedevelopment.com — dns-internal dnsmasq already wildcards
    # *.ramonedevelopment.com to cortex's tailnet IP and DNS-01 mints the cert
    # on demand, so no DNS/cert change was needed. `auth.` intentionally NOT
    # used — reserved for the future magiq-auth migration off the Windows box.

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.12}
    restart: unless-stopped
    <<: *default-logging
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      AUTHENTIK_REDIS__HOST: redis-stack
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    # No /var/run/docker.sock mount on purpose (least-privilege, matches the
    # ro-socket / uid-1000 pattern used elsewhere here). The embedded outpost
    # runs inside authentik-server, so the worker doesn't need Docker access.
    # Only add the socket if you later run SEPARATE outpost containers that
    # Authentik should auto-manage.

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudbeaver.rule=Host(`sql.ramonedevelopment.com`)"
      - "traefik.http.routers.cloudbeaver.entrypoints=tailnet"
      - "traefik.http.routers.cloudbeaver.tls.certresolver=public"
      - "traefik.http.services.cloudbeaver.loadbalancer.server.port=8978"
      - "homepage.group=Data"
      - "homepage.name=CloudBeaver"
      - "homepage.icon=cloudbeaver.png"
      - "homepage.href=https://sql.ramonedevelopment.com"
      - "homepage.description=SQL admin — MySQL + SQL Server"
    # Web SQL client for mysql + sqlserver. No pre-seeded connections via compose — CE edition
    # configures connections through the UI on first load (see setup guide Stage 19). Reaches
    # both databases by Docker service name (mysql:3306, sqlserver:1433) over the default
    # compose network — no Tailscale hop needed since cloudbeaver, mysql, and sqlserver all
    # land on the same bridge network (none of the three set network_mode: host).

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    <<: *default-logging
    # Keeps the PUBLIC A records for the internet-facing hosts (tower, login)
    # pointed at cortex's current WAN IP — replaces the old No-IP DDNS now that
    # DNS is on Cloudflare. Detects the WAN IP via Cloudflare's 1.1.1.1 trace
    # (no host networking / no port needed) and updates via the API on change,
    # rechecking on a schedule. Reuses the SAME scoped CF_DNS_API_TOKEN Traefik
    # already uses for DNS-01 (Zone:Read + DNS:Edit on ramonedevelopment.com) —
    # no new secret. Rootless + hardened per the image's design.
    #
    # PROXIED=true assumes the tower/login records are orange-cloud (recommended
    # — hides the WAN IP, adds WAF). Set to "false" if you run them DNS-only.
    # Only the two PUBLIC hosts are listed; every other service is tailnet-only
    # and resolves via the dns-internal split-DNS, so it needs no public record.
    # favonia creates the records if missing and manages them thereafter.
    user: "1000:1000"
    read_only: true
    cap_drop:
      - all
    security_opt:
      - no-new-privileges:true
    environment:
      CLOUDFLARE_API_TOKEN: ${CF_DNS_API_TOKEN}
      DOMAINS: tower.ramonedevelopment.com,login.ramonedevelopment.com
      PROXIED: "true"
      IP6_PROVIDER: none

  cloudflare-ddns-media:
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    <<: *default-logging
    # Second DDNS instance for the magiq-media per-branch dev hosts (defined in
    # that repo's docker-compose.cortex.yml, deployed to cortex separately, NOT
    # in this stack). Separate from the main cloudflare-ddns above ONLY because
    # these must be DNS-only (grey cloud): media-api-{akshay,damian} handle large
    # media payloads, and Cloudflare's free proxy caps request bodies at 100MB +
    # buffers streaming. Grey-cloud A records point straight at cortex's WAN IP
    # (no Cloudflare in the path), avoiding both limits. Tradeoff accepted
    # 2026-07-14: exposes the WAN IP and skips the CF WAF for these hosts.
    # media-api-* carry NO auth by design (public API for external devs);
    # dynamodb-admin-* are Traefik basicauth-gated in the media compose, so
    # grey-cloud is fine for them too. Replaces the old No-IP wildcard record
    # (decommissioned) — with no wildcard, each public host needs its own record.
    # media-dynamodb-local stays tailnet-only, so it's NOT listed here (the
    # dns-internal split-DNS answers it). Same scoped CF_DNS_API_TOKEN as the
    # main instance; the two instances manage disjoint DOMAINS so never collide.
    user: "1000:1000"
    read_only: true
    cap_drop:
      - all
    security_opt:
      - no-new-privileges:true
    environment:
      CLOUDFLARE_API_TOKEN: ${CF_DNS_API_TOKEN}
      DOMAINS: media-api-akshay.ramonedevelopment.com,media-api-damian.ramonedevelopment.com,dynamodb-admin-akshay.ramonedevelopment.com,dynamodb-admin-damian.ramonedevelopment.com
      PROXIED: "false"
      IP6_PROVIDER: none

  dns-internal:
    image: 4km3/dnsmasq:2.90-r3
    restart: unless-stopped
    <<: *default-logging
    network_mode: host
    cap_add:
      - NET_ADMIN
    command:
      - "--listen-address=100.90.195.22"
      - "--bind-interfaces"
      - "--no-resolv"
      - "--no-hosts"
      - "--address=/ramonedevelopment.com/100.90.195.22"
      - "--server=1.1.1.1"
      - "--server=8.8.8.8"
      - "--log-queries"
    # Split-DNS resolver for the tailnet (Phase 2 of traefik-internal-tls-implementation-plan.md).
    # Answers every *.ramonedevelopment.com query with cortex's own tailnet IP so tailnet
    # devices reach internal Traefik routers without --resolve tricks or hosts-file entries;
    # forwards every other query upstream. --listen-address + --bind-interfaces restricts
    # dnsmasq to the tailscale0 IP ONLY — it must never bind :53 on all interfaces, since that
    # would collide with systemd-resolved's 127.0.0.53 stub listener and/or answer queries from
    # the LAN/public interface. Wired into Tailscale as a RESTRICTED nameserver (split DNS) for
    # the ramonedevelopment.com search domain — not a global nameserver — so non-tailnet
    # clients are completely unaffected. NOT yet empirically verified — confirm nslookup
    # results from a tailnet client before relying on this.

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    <<: *default-logging
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "home.ramonedevelopment.com"
    volumes:
      - /mnt/shared/claudia/magiq/homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.ramonedevelopment.com`)"
      - "traefik.http.routers.homepage.entrypoints=tailnet"
      - "traefik.http.routers.homepage.tls.certresolver=public"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      # Forward-auth via Authentik — DOMAIN-LEVEL mode. Works now that the
      # tailnet entrypoint is :443 (default HTTPS port): the browser Host header
      # is a bare `home.ramonedevelopment.com` with no port, so the outpost's
      # cookie-domain suffix match against `ramonedevelopment.com` succeeds.
      # (On :8443 this failed — authentik #12503 — which is why we moved to
      # :443.) One Authentik proxy provider (Forward auth → domain level, cookie
      # domain ramonedevelopment.com) bound to the embedded outpost gates every
      # host carrying this middleware, with one shared session cookie. No
      # per-host -outpost router needed.
      - "traefik.http.routers.homepage.middlewares=authentik@docker"
    # Landing page for every tailnet admin UI. Config lives in the magiq repo itself
    # (homepage-config/, bind-mounted, git-trackable — same convention as everything else in
    # this file) rather than a named volume, so it's editable directly and versioned alongside
    # the compose file. Docker socket is read-only and used only for label discovery + optional
    # container stats — Homepage does not need write access to manage containers.
    # Tile discovery is label-driven: every other service in this file carries homepage.group/
    # name/icon/href/description labels. Adding a new service's tile is the same edit as adding
    # its traefik.* labels — no second file to keep in sync. Non-Docker things (Cockpit) are
    # added manually in homepage-config/services.yaml instead, since there's no container to
    # attach a label to.
    # HOMEPAGE_ALLOWED_HOSTS is required as of the Next.js 16 base image — without it every
    # request 500s with "Host validation failed for: home.ramonedevelopment.com" regardless
    # of Traefik routing working correctly. Value must match the browser Host header exactly.
    # On the :443 tailnet entrypoint that's the bare hostname (no port) — updated 2026-07-14
    # when the entrypoint moved 8443→443; it previously had to include ":8443". Confirmed 2026-07-05.

  mcp-azure-devops:
    build:
      context: /mnt/shared/claudia/magiq/mcp/azure-devops
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    <<: *default-logging
    env_file:
      - /mnt/shared/claudia/magiq/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-ado.rule=Host(`mcp-ado.ramonedevelopment.com`)"
      - "traefik.http.routers.mcp-ado.entrypoints=tailnet"
      - "traefik.http.routers.mcp-ado.tls.certresolver=public"
      - "traefik.http.services.mcp-ado.loadbalancer.server.port=8000"
      - "homepage.group=Ops"
      - "homepage.name=Azure DevOps MCP"
      - "homepage.icon=azure-devops.png"
      - "homepage.href=https://mcp-ado.ramonedevelopment.com/mcp"
      - "homepage.description=ADO MCP gateway (API endpoint, not a browser UI)"
    # Tailnet-only router, gets a real LE cert via the public `public` resolver — now DNS-01
    # (Cloudflare), see traefik service. Service stays unreachable from the public internet
    # (entrypoints=tailnet only); with DNS-01 not even the ACME challenge is public anymore.

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - shared_data:/data/shared
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  netdata:
    image: netdata/netdata:latest
    restart: unless-stopped
    <<: *default-logging
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "homepage.group=Infrastructure"
      - "homepage.name=Netdata"
      - "homepage.icon=netdata.png"
      - "homepage.href=http://100.90.195.22:19999"
      - "homepage.description=Resource/CPU/RAM monitoring"
    # network_mode: host bypasses Traefik, binds :19999 to all interfaces — locked to tailscale0 via ufw, see Decision Log

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    <<: *default-logging
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_AUTH: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui_data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.ramonedevelopment.com`)"
      - "traefik.http.routers.openwebui.entrypoints=tailnet"
      - "traefik.http.routers.openwebui.tls.certresolver=public"
      - "homepage.group=AI"
      - "homepage.name=Open WebUI"
      - "homepage.icon=open-webui.png"
      - "homepage.href=https://chat.ramonedevelopment.com"
      - "homepage.description=Ollama chat frontend"
    # mem_limit/cpus deferred until post-Stage-12 contention benchmarking

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.ramonedevelopment.com`)"
      - "traefik.http.routers.portainer.entrypoints=tailnet"
      - "traefik.http.routers.portainer.tls.certresolver=public"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "homepage.group=Infrastructure"
      - "homepage.name=Portainer"
      - "homepage.icon=portainer.png"
      - "homepage.href=https://portainer.ramonedevelopment.com"
      - "homepage.description=Docker container management"
    # loadbalancer.server.port=9000 added 2026-07-05 — same class of bug as Seq: Portainer's
    # image exposes THREE ports (8000 edge agent, 9000 plain HTTP UI, 9443 HTTPS UI). Without an
    # explicit port, Traefik's docker provider has to guess and may pick the wrong one. 9000 is
    # the plain-HTTP web UI, matching Traefik's default plain-HTTP backend communication.

  redis-stack:
    image: redis/redis-stack:latest
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redisinsight.rule=Host(`redis.ramonedevelopment.com`)"
      - "traefik.http.routers.redisinsight.entrypoints=tailnet"
      - "traefik.http.routers.redisinsight.tls.certresolver=public"
      - "traefik.http.services.redisinsight.loadbalancer.server.port=8001"
      # Forward-auth via Authentik — domain-level (see homepage). Middleware only.
      - "traefik.http.routers.redisinsight.middlewares=authentik@docker"
      - "homepage.group=Data"
      - "homepage.name=RedisInsight"
      - "homepage.icon=redis.png"
      - "homepage.href=https://redis.ramonedevelopment.com"
      - "homepage.description=Redis Stack admin UI"
    # RedisInsight UI bundled on container port 8001. Redis protocol (6379) stays off Traefik —
    # reach it directly via Tailscale IP + port.

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    <<: *default-logging
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD}
    volumes:
      - seq_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seq.rule=Host(`logs.ramonedevelopment.com`)"
      - "traefik.http.routers.seq.entrypoints=tailnet"
      - "traefik.http.routers.seq.tls.certresolver=public"
      - "traefik.http.services.seq.loadbalancer.server.port=80"
      - "homepage.group=Data"
      - "homepage.name=Seq"
      - "homepage.icon=seq.png"
      - "homepage.href=https://logs.ramonedevelopment.com"
      - "homepage.description=Log aggregation"
    # Renamed from seq.ramonedevelopment.com — that FQDN is already in use by the
    # Windows Traefik instance for its own Seq. logs.ramonedevelopment.com avoids the collision.
    # SEQ_FIRSTRUN_ADMINPASSWORD required as of Seq 2025.2.x — confirmed 2026-07-05, container
    # crash-loops on boot without it ("No default admin password was supplied") and Traefik never
    # gets a stable container to register a router for, which is what actually caused the
    # "router not found: seq@docker" symptom, not a labels/routing problem. Log in as admin/
    # loadbalancer.server.port=80 added same day — Seq's image exposes FOUR ports (80 plain UI,
    # 443 TLS UI, 5341 plain ingestion, 45341 TLS ingestion). Without an explicit port, Traefik's
    # docker provider auto-selected one on its own (visible as the "seq-stack" default service
    # name) and got it wrong, causing a 404 even after the router itself was confirmed correctly
    # registered. Every other multi-port service in this file (redis-stack, cloudbeaver, tower,
    # kuma, mcp-azure-devops) already pins this explicitly — Seq was the one gap.
    # <the password you set> on first load.

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    <<: *default-logging
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - mssql_data:/var/opt/mssql
      - shared_data:/data/shared
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── AIS-OS Control Tower
  tower:
    build:
      context: /mnt/shared/claudia/magiq
      dockerfile: tower/Dockerfile
    restart: unless-stopped
    <<: *default-logging
    user: "1000:1000"
    env_file:
      - /mnt/shared/claudia/magiq/.env
    volumes:
      - /mnt/shared/claudia/magiq:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tower.rule=Host(`tower.ramonedevelopment.com`)"
      # PUBLIC + tailnet: listens on both the public (websecure, LAN-NIC :443,
      # router-forwarded from WAN) and tailnet entrypoints. Tailnet clients reach
      # it via split-DNS→tailscale IP; public clients via Cloudflare/WAN→forward.
      - "traefik.http.routers.tower.entrypoints=tailnet,websecure"
      - "traefik.http.routers.tower.tls.certresolver=public"
      - "traefik.http.services.tower.loadbalancer.server.port=8765"
      # Authentik forward-auth — SINGLE-APPLICATION with a group-restricted
      # policy (only members of the `tower-users` group get in), because this is
      # the one host reachable from the public internet. Distinct from the
      # domain-level gate on the tailnet-only UIs: single-app exact-host match
      # (tower.ramonedevelopment.com) takes precedence over the domain-level
      # provider, so tower's own restrictive policy applies. Needs the per-host
      # -outpost router for the /outpost.goauthentik.io/ callback path, on BOTH
      # entrypoints so the login round-trip completes from public and tailnet.
      # Tower keeps its own TOWER_TOKEN bearer auth underneath — defense in depth.
      - "traefik.http.routers.tower.middlewares=authentik@docker"
      - "traefik.http.routers.tower-outpost.rule=Host(`tower.ramonedevelopment.com`) && PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.tower-outpost.entrypoints=tailnet,websecure"
      - "traefik.http.routers.tower-outpost.tls.certresolver=public"
      - "traefik.http.routers.tower-outpost.service=authentik@docker"
      - "homepage.group=Ops"
      - "homepage.name=AIS-OS Tower"
      - "homepage.icon=dashboard.png"
      - "homepage.href=https://tower.ramonedevelopment.com"
      - "homepage.description=ADO sprint dashboard, Hermes inbox, decisions, interrupts"

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    <<: *default-logging
    environment:
      # Scoped Cloudflare token (Zone:Read + DNS:Edit on ramonedevelopment.com) — read by
      # lego's cloudflare provider for the DNS-01 challenge below. Real value in cortex ~/stack/.env.
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    network_mode: host
    # Required for the tailnet entrypoint below: Tailscale creates tailscale0 in the HOST
    # network namespace. A container on the default bridge network can't see it — binding to
    # a tailscale IP from inside a bridge-networked container fails with
    # "bind: cannot assign requested address" even when the IP is correct (confirmed via
    # `tailscale ip -4` on the host). host networking puts Traefik in the host's namespace,
    # same fix pattern already used for netdata below. `ports:` is dropped below since it's
    # meaningless (and ignored) under host networking — the entrypoint addresses in `command`
    # are what actually bind now.
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.tailnet.address=100.90.195.22:443"    # must match `tailscale ip -4` on cortex; :443 (was :8443) so domain-level forward-auth works — see Authentik block
      - "--entrypoints.web.address=192.168.0.253:80"         # public HTTP, pinned to the LAN NIC (enp196s0) so tailscale0:80 stays free
      - "--entrypoints.websecure.address=192.168.0.253:443"  # public HTTPS, pinned to the LAN NIC so tailscale0:443 is free for the tailnet entrypoint above
      - "--certificatesresolvers.public.acme.dnschallenge=true"
      - "--certificatesresolvers.public.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.public.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.public.acme.email=chase.ramone@magiqsoftware.com"
      - "--certificatesresolvers.public.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--api.dashboard=true"
      # cortex is now sole owner of ramonedevelopment.com's public ACME path.
      # Windows Traefik box decommissioned 2026-07 — see Decision Log.
      # ACME switched HTTP-01 -> DNS-01 (Cloudflare) 2026-07-08: No-IP was never a supported lego
      # DNS provider, and DNS moved to Cloudflare. DNS-01 means the ACME challenge no longer needs
      # a public :80 — lego writes a _acme-challenge TXT via the Cloudflare API instead. The public
      # :80 port-forward can (and should) now be closed at the router; nothing here needs it.
      # Certs stay per-host (each router triggers its own) — no wildcard required. The dns-internal
      # dnsmasq split-DNS (A records for tailnet clients) is unaffected: LE validates the TXT
      # against Cloudflare's PUBLIC authoritative zone, independent of the tailnet A answers.
    # NOTE: DOCKER_API_VERSION env var does NOT fix the "client version 1.24 is too old" error —
    # tried that first, no effect. Root cause: Traefik versions before 3.6.1 hardcode their
    # Docker SDK client to declare API v1.24 regardless of env vars; Docker Engine 29 raised
    # its minimum accepted client version to 1.44 and rejects that fallback outright. Fixed
    # upstream in Traefik 3.6.1 via real auto-negotiation — pinning the image to v3.6 (above)
    # is the actual fix, not a config workaround. See Decision Log if downgrading Docker
    # Engine instead is ever considered — not recommended, just documenting the alternative.
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/tailscale/certs:/tailscale-certs:ro"
      - "traefik_certs:/letsencrypt"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.ramonedevelopment.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=tailnet"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=public"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      # Forward-auth via Authentik — domain-level (see homepage). Middleware only.
      - "traefik.http.routers.traefik-dashboard.middlewares=authentik@docker"
      - "traefik.http.services.traefik-stack.loadbalancer.server.port=8080"
      - "homepage.group=Infrastructure"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.ramonedevelopment.com"
      - "homepage.description=Reverse proxy dashboard"
    # api.dashboard=true turns on the read/write API + UI; api@internal is Traefik's built-in
    # virtual service for its own API, no separate container needed. Same §10.3b cert pattern
    # and tailnet-only reachability as every other admin UI here — no extra basic-auth
    # middleware added since Tailscale-only access is already this stack's security boundary.
    # traefik.http.services.traefik-stack.loadbalancer.server.port=8080 — Traefik's Docker
    # provider always attempts to auto-build a default backend service for any container with
    # traefik.enable=true, independent of whether a router actually uses it. Since this
    # container runs network_mode: host with no exposed port, that auto-build fails with
    # "port is missing" (confirmed 2026-07-05, harmless — the traefik-dashboard router above
    # already overrides its backend to api@internal, so the auto-built service is dead code).
    # This throwaway port value is never actually dispatched to; it just satisfies Traefik's
    # internal check so the error stops repeating in the logs.

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kuma.rule=Host(`status.ramonedevelopment.com`)"
      - "traefik.http.routers.kuma.entrypoints=tailnet"
      - "traefik.http.routers.kuma.tls.certresolver=public"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"
      - "homepage.group=Ops"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=https://status.ramonedevelopment.com"
      - "homepage.description=Status/uptime monitoring"
    # Uptime/status monitor for the tailnet services (chat/logs/portainer/redis/tower/sql/etc).
    # Distinct from Netdata — Netdata is resource/CPU/RAM pressure, Kuma is availability history
    # + alerting per monitored URL. Add each Traefik-fronted hostname as an HTTP(s) monitor
    # after first login (Stage 18).

  whoami-test:
    image: traefik/whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami-test.rule=Host(`test.ramonedevelopment.com`)"
      - "traefik.http.routers.whoami-test.entrypoints=websecure"
      - "traefik.http.routers.whoami-test.tls.certresolver=public"

  # --- FUTURE services to migrate off the Windows Traefik box once decommissioned.
  #     These currently run elsewhere (host.docker.internal:<port> on Windows) — add real
  #     service definitions here as each is moved to cortex, then label + uncomment routing.
  #
  # magiq-auth:
  #   labels:
  #     - "traefik.enable=true"
