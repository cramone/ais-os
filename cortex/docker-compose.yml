  #
  # media-api:
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.media-api.rule=Host(`media-api.ramonedevelopment.com`)"
  #     - "traefik.http.routers.media-api.entrypoints=websecure"
  #     - "traefik.http.routers.media-api.tls.certresolver=public"
  #
  # media-ui:
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.media-ui.rule=Host(`media.ramonedevelopment.com`)"
  #     - "traefik.http.routers.media-ui.entrypoints=websecure"
  #     - "traefik.http.routers.media-ui.tls.certresolver=public"
  #
  # tenant1 / tenant2 / www / traefik-dashboard: same pattern, see legacy Windows dynamic.yml
  # for the full router/service list to port over.

volumes:
