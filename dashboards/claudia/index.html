<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudia — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;--bg2:#0e0e12;--bg3:#14141a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e6e0;--text2:rgba(232,230,224,0.55);--text3:rgba(232,230,224,0.28);
  --green:#1D9E75;--purple:#7F77DD;--amber:#EF9F27;--red:#D85A30;--teal:#5DCAA5;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;font-size:13px}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.avatar{width:30px;height:30px;border-radius:50%;background:conic-gradient(from 135deg,#4A3FCC,#1D9E75,#4A3FCC);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-size:14px;font-weight:600}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.status-bar{display:flex;align-items:center;gap:18px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s ease-in-out infinite}
.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:1px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);flex-shrink:0}
.stat-card{background:var(--bg);padding:11px 20px}
.stat-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.c-green{color:var(--green)}.c-purple{color:var(--purple)}.c-amber{color:var(--amber)}.c-teal{color:var(--teal)}

/* LAYOUT: left | center | right */
.main{display:grid;grid-template-columns:260px 1fr 260px;flex:1;gap:1px;background:var(--border);min-height:0;overflow:hidden}
.col{display:flex;flex-direction:column;gap:1px;background:var(--border);overflow:hidden}
.panel{background:var(--bg);padding:16px 18px;overflow:hidden;display:flex;flex-direction:column}
.panel-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.icon-btn{background:none;border:0.5px solid var(--border2);border-radius:4px;padding:3px 9px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);cursor:pointer}
.icon-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.loading{color:var(--text3);font-size:11px;font-family:'DM Mono',monospace;padding:8px 0}
.error-msg{color:var(--red);font-size:11px;font-family:'DM Mono',monospace}

/* EVENT CARDS */
.ev-card{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--bg2);border-radius:7px;border:0.5px solid var(--border)}
.ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ev-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);min-width:34px;padding-top:1px}
.ev-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.ev-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* PROJECT LIST */
.proj-card{padding:12px 14px;background:var(--bg2);border-radius:8px;border:0.5px solid var(--border);cursor:pointer;transition:border-color 0.15s}
.proj-card:hover{border-color:var(--border2)}
.proj-card.active{border-color:var(--purple);background:rgba(127,119,221,0.06)}
.proj-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.proj-meta{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}

/* CENTER — ORB VIEW */
#view-orb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:0;background:var(--bg)}
.chat-bubbles{width:100%;max-width:520px;margin-top:48px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;max-width:88%}
.bubble-user{align-self:flex-end;background:rgba(127,119,221,0.15);border:0.5px solid rgba(127,119,221,0.3)}
.bubble-claudia{align-self:flex-start;background:rgba(29,158,117,0.1);border:0.5px solid rgba(29,158,117,0.25)}
.chat-input-row{width:100%;max-width:520px;display:flex;gap:8px;align-items:center;margin-top:16px;flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:13px;font-family:'Syne',sans-serif;color:var(--text);outline:none;transition:border-color 0.15s}
.chat-input:focus{border-color:rgba(127,119,221,0.5)}
.chat-input::placeholder{color:var(--text3)}
.mic-btn{width:40px;height:40px;border-radius:50%;background:rgba(29,158,117,0.1);border:0.5px solid rgba(29,158,117,0.3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.send-btn{background:rgba(127,119,221,0.15);border:0.5px solid rgba(127,119,221,0.35);border-radius:9px;padding:11px 18px;font-size:13px;color:var(--purple);cursor:pointer;font-family:'Syne',sans-serif;font-weight:500;white-space:nowrap}
.send-btn:hover{background:rgba(127,119,221,0.25)}

/* CENTER — PROJECT VIEW */
#view-project{flex:1;display:none;flex-direction:column;background:var(--bg);overflow:hidden}
.proj-header{padding:18px 24px 0;flex-shrink:0}
.proj-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.proj-title{font-size:18px;font-weight:700}
.close-btn{width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);cursor:pointer;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:color 0.15s}
.close-btn:hover{color:var(--text);background:rgba(255,255,255,0.08)}
.proj-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border)}
.tab-btn{padding:10px 20px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple)}
.proj-body{flex:1;overflow-y:auto;padding:18px 24px}
.proj-section{display:none}.proj-section.active{display:block}

/* PROJECT BRIEF */
.brief-md{font-size:13px;line-height:1.7;color:var(--text2)}
.brief-md h1{font-size:16px;font-weight:700;color:var(--text);margin:0 0 14px}
.brief-md h2{font-size:13px;font-weight:600;color:var(--teal);margin:16px 0 8px;letter-spacing:0.3px}
.brief-md p{margin-bottom:10px}
.brief-md ul{margin:6px 0 10px 18px}
.brief-md li{margin-bottom:4px}
.brief-md table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.brief-md td,.brief-md th{padding:7px 12px;border:0.5px solid var(--border2);color:var(--text2)}
.brief-md th{color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.brief-md code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px;color:var(--teal)}

/* DEVOPS CARDS */
.state-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.state-tab{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:5px;cursor:pointer;border:0.5px solid var(--border2);background:none;color:var(--text3);transition:all 0.15s}
.state-tab.active-tab{border-color:var(--teal);background:rgba(93,202,165,0.1);color:var(--teal)}
.devops-card{padding:11px 14px;background:var(--bg2);border-radius:8px;border:0.5px solid var(--border);border-left:2px solid transparent;margin-bottom:7px}
.devops-card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px}
.devops-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.devops-tag{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px}
.devops-id{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-left:auto}

/* DECISIONS */
.decision-card{padding:12px 14px;background:var(--bg2);border-radius:8px;border:0.5px solid var(--border);border-left:2px solid var(--purple);margin-bottom:8px}
.decision-date{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:5px}
.decision-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.decision-body{font-size:12px;color:var(--text2);line-height:1.5}

/* MINI CHAT BAR (project mode) */
#mini-chat{display:none;padding:10px 24px;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;align-items:center;gap:8px}
#mini-chat input{flex:1;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);border-radius:7px;padding:9px 14px;font-size:13px;font-family:'Syne',sans-serif;color:var(--text);outline:none}
#mini-chat input::placeholder{color:var(--text3)}

/* MAIL */
.mail-card{padding:10px 12px;background:var(--bg2);border-radius:7px;border:0.5px solid var(--border);border-left:2px solid var(--purple);margin-bottom:6px}
.mail-sender{font-size:12px;font-weight:600;color:var(--text)}
.mail-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.mail-subject{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* SERVICE ROW */
.svc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border)}
.svc-row:last-child{border-bottom:none}
.svc-name{font-size:13px;font-weight:500}
.svc-detail{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.pill{font-size:10px;font-family:'DM Mono',monospace;padding:2px 9px;border-radius:20px}
.pill-on{background:rgba(29,158,117,0.15);color:var(--green)}
.pill-off{background:rgba(216,90,48,0.12);color:var(--red)}

/* MEMORY TAGS */
.mem-tag{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border2);color:var(--text2)}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="avatar">C</div>
    <div><div class="logo-text">Claudia</div><div class="logo-sub">command center</div></div>
  </div>
  <div class="status-bar">
    <div class="status-pill"><div class="dot dot-green" id="gw-dot"></div><span>gateway</span></div>
    <div class="status-pill"><div class="dot dot-green" id="google-dot"></div><span>google</span></div>
    <div class="clock" id="clock">--:-- --</div>
  </div>
</header>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card"><div class="stat-label">Gateway</div><div class="stat-val c-green" id="s-gateway">—</div><div class="stat-sub">hermes</div></div>
  <div class="stat-card"><div class="stat-label">Unread</div><div class="stat-val c-purple" id="s-unread">—</div><div class="stat-sub">gmail</div></div>
  <div class="stat-card"><div class="stat-label">Events</div><div class="stat-val c-amber" id="s-events">—</div><div class="stat-sub" id="s-date">today</div></div>
  <div class="stat-card"><div class="stat-label">DevOps</div><div class="stat-val c-teal" id="s-devops-total">—</div><div class="stat-sub" id="s-devops-cr">— in review</div></div>
  <div class="stat-card"><div class="stat-label">Next Brief</div><div class="stat-val c-teal" id="s-briefing">—</div><div class="stat-sub">08:30 AEST</div></div>
</div>

<!-- MAIN GRID -->
<div class="main">

  <!-- LEFT: Calendar + Projects -->
  <div class="col">
    <div class="panel" style="flex:0 0 auto">
      <div class="panel-label">Today <button class="icon-btn" onclick="loadCalendar()">↺</button></div>
      <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px" id="cal-date"></div>
      <div id="cal-events" style="display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:190px"><div class="loading">loading...</div></div>
    </div>
    <div class="panel" style="flex:1;overflow:hidden">
      <div class="panel-label">Projects <button class="icon-btn" onclick="loadProjects()">↺</button></div>
      <div id="project-list" style="display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1"><div class="loading">loading...</div></div>
    </div>
  </div>

  <!-- CENTER: Orb view / Project view -->
  <div class="col" style="background:var(--bg);position:relative">

    <!-- ORB VIEW (default) -->
    <div id="view-orb">
      <div id="orb-container" onclick="orbClick()" style="position:relative;width:240px;height:240px;cursor:pointer;flex-shrink:0">
        <canvas id="orb" width="240" height="240" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
        <div id="orb-label" style="position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;white-space:nowrap">idle</div>
      </div>
      <div class="chat-bubbles" id="chat-area"></div>
      <div class="chat-input-row">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎙</button>
        <input class="chat-input" id="ask-input" placeholder="Ask Claudia anything..."/>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- PROJECT VIEW (shown on project select) -->
    <div id="view-project">
      <div class="proj-header">
        <div class="proj-title-row">
          <div class="proj-title" id="proj-title">Project</div>
          <button class="close-btn" onclick="closeProject()" title="Close">✕</button>
        </div>
        <div class="proj-tabs">
          <button class="tab-btn active" onclick="switchTab('brief')">Overview</button>
          <button class="tab-btn" onclick="switchTab('devops')">DevOps</button>
          <button class="tab-btn" onclick="switchTab('decisions')">Decisions</button>
        </div>
      </div>
      <div class="proj-body">
        <div class="proj-section active" id="tab-brief"><div class="loading">loading...</div></div>
        <div class="proj-section" id="tab-devops"><div class="loading">loading...</div></div>
        <div class="proj-section" id="tab-decisions"><div class="loading">loading...</div></div>
      </div>
      <!-- Mini chat bar in project mode -->
      <div id="mini-chat">
        <button class="mic-btn" id="mini-mic-btn" onclick="toggleMic()" style="width:36px;height:36px;font-size:14px">🎙</button>
        <input id="mini-ask-input" placeholder="Ask Claudia..." style="font-size:13px"/>
        <button onclick="sendMiniMessage()" class="send-btn" style="padding:8px 14px;font-size:12px">Send</button>
      </div>
    </div>

  </div>

  <!-- RIGHT: Mail + Services + Memory -->
  <div class="col">
    <div class="panel" style="flex:0 0 auto">
      <div class="panel-label">Inbox <button class="icon-btn" onclick="loadGmail()">↺</button></div>
      <div id="mail-list" style="display:flex;flex-direction:column;overflow-y:auto;max-height:220px"><div class="loading">loading...</div></div>
    </div>
    <div class="panel" style="flex:0 0 auto">
      <div class="panel-label">Services <button class="icon-btn" onclick="loadStatus()">↺</button></div>
      <div id="service-list"><div class="loading">loading...</div></div>
    </div>
    <div class="panel" style="flex:1">
      <div class="panel-label">Memory</div>
      <div id="memory-tags" style="display:flex;flex-wrap:wrap;gap:5px"><div class="loading">loading...</div></div>
    </div>
  </div>

</div>

<script>
const API='http://localhost:7842/api';
const COLORS=['#1D9E75','#7F77DD','#EF9F27','#D85A30','#5DCAA5'];
const STATE_COLORS={'Active':'#1D9E75','In Progress':'#1D9E75','Code Review':'#EF9F27','In Review':'#EF9F27','New':'#7F77DD','To Do':'#7F77DD','Blocked':'#D85A30','Done':'#5DCAA5','Closed':'#5DCAA5'};
const TYPE_ICONS={'Epic':'◈','Feature':'◆','User Story':'◇','Product Backlog Item':'◇','Bug':'⚑','Task':'◻'};

// ── STATE ──────────────────────────────────────────────────────
let orbState='idle', orbEnergy=0, orbPhase=0, particles=[];
let analyser=null, dataArr=null, audioCtx=null;
let devopsData=null, activeFilter=null;
let mediaStream=null, recognition=null, isRecording=false;
let currentProject=null, activeTab='brief';
let allProjects=[];

// ── ORB ────────────────────────────────────────────────────────
function initOrb(){
  const canvas=document.getElementById('orb');
  if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=240,H=240,CX=W/2,CY=H/2;
  for(let i=0;i<75;i++) particles.push({angle:Math.random()*Math.PI*2,radius:80+Math.random()*28,size:0.5+Math.random()*1.4,speed:0.002+Math.random()*0.006,opacity:0.1+Math.random()*0.4,phase:Math.random()*Math.PI*2});
  function hex(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
  function cols(){return orbState==='listening'?['#1D9E75','#5DCAA5','#1D9E75']:orbState==='thinking'?['#7F77DD','#4A3FCC','#B8B3F5']:orbState==='speaking'?['#EF9F27','#D85A30','#F5C96A']:['#4A3FCC','#1D9E75','#7F77DD']}
  function freq(a){if(!analyser||!dataArr)return 0;analyser.getByteFrequencyData(dataArr);return(dataArr[Math.min(Math.floor((a/(Math.PI*2))*dataArr.length/2),dataArr.length-1)]||0)/255}
  function draw(){
    ctx.clearRect(0,0,W,H);orbPhase+=0.008;
    const e=orbEnergy,c=cols(),baseR=65+e*18;
    for(let ring=3;ring>=1;ring--){const r=baseR+ring*14+Math.sin(orbPhase*.7+ring)*4*e;const g=ctx.createRadialGradient(CX,CY,r*.6,CX,CY,r);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.7,hex(c[0],.03*ring*e));g.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()}
    ctx.beginPath();
    for(let i=0;i<=180;i++){const a=(i/180)*Math.PI*2,n=Math.sin(a*3+orbPhase*1.1)*6*e+Math.sin(a*5-orbPhase*.8)*4*e+Math.sin(a*7+orbPhase*1.4)*2*e+freq(a)*20,r=baseR+n;i===0?ctx.moveTo(CX+Math.cos(a)*r,CY+Math.sin(a)*r):ctx.lineTo(CX+Math.cos(a)*r,CY+Math.sin(a)*r)}
    ctx.closePath();
    const g=ctx.createRadialGradient(CX-12,CY-12,4,CX,CY,baseR+8);g.addColorStop(0,hex(c[2],.95));g.addColorStop(.4,hex(c[0],.85));g.addColorStop(.75,hex(c[1],.7));g.addColorStop(1,hex(c[0],.3));ctx.fillStyle=g;ctx.fill();
    particles.forEach(p=>{p.angle+=p.speed*(1+e*.5);const r=p.radius+Math.sin(orbPhase*.4+p.phase)*6*e;ctx.beginPath();ctx.arc(CX+Math.cos(p.angle)*r,CY+Math.sin(p.angle)*r,p.size*(.5+e*.6),0,Math.PI*2);ctx.fillStyle=hex(c[0],p.opacity*(.3+e*.7));ctx.fill()});
    orbEnergy+=(({idle:.15,thinking:.65,listening:.8,speaking:.9}[orbState]||.15)-orbEnergy)*.04;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

function setOrbState(s){
  orbState=s;
  const labels={idle:'idle',listening:'listening',thinking:'processing',speaking:'responding'};
  const clrs={idle:'var(--text3)',listening:'var(--green)',thinking:'var(--purple)',speaking:'var(--amber)'};
  const lbl=document.getElementById('orb-label');
  if(lbl){lbl.textContent=labels[s]||s;lbl.style.color=clrs[s]||'var(--text3)'}
}

initOrb();
setOrbState('idle');

// ── VOICE ──────────────────────────────────────────────────────
async function toggleMic(){
  if(isRecording){stopMic();return}
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){appendBubble('claudia','Speech recognition not supported. Use Chrome.');return}
  isRecording=true;
  ['mic-btn','mini-mic-btn'].forEach(id=>{const b=document.getElementById(id);if(b)b.style.background='rgba(239,159,39,0.25)'});
  setOrbState('listening');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-AU';recognition.interimResults=false;
  recognition.onresult=e=>{stopMic();processUserInput(e.results[0][0].transcript)};
  recognition.onerror=()=>stopMic();recognition.onend=()=>{if(isRecording)stopMic()};recognition.start();
  try{mediaStream=await navigator.mediaDevices.getUserMedia({audio:true});audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=256;dataArr=new Uint8Array(analyser.frequencyBinCount);audioCtx.createMediaStreamSource(mediaStream).connect(analyser)}catch(e){}
}
function stopMic(){
  isRecording=false;
  ['mic-btn','mini-mic-btn'].forEach(id=>{const b=document.getElementById(id);if(b)b.style.background='rgba(29,158,117,0.1)'});
  try{recognition&&recognition.stop()}catch(e){}
  if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null}
  if(audioCtx){audioCtx.close();audioCtx=null;analyser=null;dataArr=null}
  if(orbState==='listening')setOrbState('idle');
}

// ── CHAT ───────────────────────────────────────────────────────
function appendBubble(role,text){
  const a=document.getElementById('chat-area');if(!a)return;
  const d=document.createElement('div');
  d.className='bubble '+(role==='user'?'bubble-user':'bubble-claudia');
  d.textContent=text;a.appendChild(d);a.scrollTop=a.scrollHeight;
}
async function processUserInput(text){
  if(!text.trim())return;
  appendBubble('user',text);
  ['ask-input','mini-ask-input'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  setOrbState('thinking');
  try{
    const sys='You are Claudia, Chase\'s operational AI assistant. Direct, dry wit, no fluff. Chase leads magiq-media C# microservices (DDD/CQRS/event sourcing, AWS DynamoDB/SQS/Lambda, Azure DevOps). Q2 priorities: complete magiq-media API, tenant management/auth, user security. Dashboard context — be concise.'
      +(currentProject?` Current project in view: ${currentProject.name}.`:'');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:text}]})});
    const data=await resp.json();
    const reply=(data.content&&data.content[0]&&data.content[0].text)||'Something went wrong.';
    setOrbState('speaking');appendBubble('claudia',reply);speak(reply);
  }catch(e){setOrbState('idle');appendBubble('claudia','API unreachable.')}
}
function speak(text){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(text);u.rate=1.05;const v=speechSynthesis.getVoices();const p=v.find(x=>x.name.includes('Zira')||x.name.includes('Jenny')||x.name.includes('Google UK English Female'));if(p)u.voice=p;u.onend=()=>setOrbState('idle');speechSynthesis.speak(u)}
function sendMessage(){const t=document.getElementById('ask-input');if(t&&t.value.trim())processUserInput(t.value.trim())}
function sendMiniMessage(){const t=document.getElementById('mini-ask-input');if(t&&t.value.trim())processUserInput(t.value.trim())}
function orbClick(){if(orbState==='idle')toggleMic();else if(orbState==='speaking'){speechSynthesis.cancel();setOrbState('idle')}}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement){
    if(document.activeElement.id==='ask-input')sendMessage();
    if(document.activeElement.id==='mini-ask-input')sendMiniMessage();
  }
});
window.speechSynthesis&&speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());

// ── PROJECT VIEW ───────────────────────────────────────────────
function openProject(proj){
  currentProject=proj;
  activeTab='brief';
  document.getElementById('view-orb').style.display='none';
  const vp=document.getElementById('view-project');
  vp.style.display='flex';
  document.getElementById('mini-chat').style.display='flex';
  document.getElementById('proj-title').textContent=proj.name;

  // Reset tabs
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.proj-section').forEach((s,i)=>s.classList.toggle('active',i===0));

  // Mark active project in list
  document.querySelectorAll('.proj-card').forEach(c=>c.classList.toggle('active',c.dataset.id===proj.id));

  // Render overview
  renderBrief(proj);

  // Pre-load devops and decisions
  renderDecisions(proj);
  renderProjDevOps();
}

function closeProject(){
  currentProject=null;
  document.getElementById('view-project').style.display='none';
  document.getElementById('mini-chat').style.display='none';
  document.getElementById('view-orb').style.display='flex';
  document.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('active'));
}

function switchTab(tab){
  activeTab=tab;
  const tabs=['brief','devops','decisions'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.proj-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

// Simple markdown → HTML for brief
function mdToHtml(md){
  return md
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3 style="font-size:12px;font-weight:600;color:var(--text2);margin:12px 0 6px">$1</h3>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\|(.+)\|$/gm,(m,cells)=>'<tr>'+cells.split('|').map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>')
    .replace(/(<tr>.*<\/tr>\n?)+/g,'<table>$&</table>')
    .replace(/\n\n/g,'<br>')
    .trim();
}

function renderBrief(proj){
  const el=document.getElementById('tab-brief');
  if(proj.brief_preview){
    el.innerHTML=`<div class="brief-md">${mdToHtml(proj.brief_preview)}</div>
      <p style="margin-top:14px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)">Showing preview — full spec in AIS-OS/projects/${proj.id}/brief.md</p>`;
  } else {
    el.innerHTML='<div class="loading">No brief found</div>';
  }
}

function renderDecisions(proj){
  const el=document.getElementById('tab-decisions');
  if(!proj.decisions||!proj.decisions.length){el.innerHTML='<div class="loading">No decisions logged yet</div>';return}
  el.innerHTML=proj.decisions.map(d=>`
    <div class="decision-card">
      <div class="decision-date">${d.title.match(/^\d{4}-\d{2}-\d{2}/)?d.title.match(/^\d{4}-\d{2}-\d{2}/)[0]:''}</div>
      <div class="decision-title">${d.title.replace(/^\d{4}-\d{2}-\d{2} — /,'')}</div>
      <div class="decision-body">${d.body||''}</div>
    </div>`).join('');
}

function renderProjDevOps(){
  const el=document.getElementById('tab-devops');
  if(!devopsData){el.innerHTML='<div class="loading">Loading DevOps data...</div>';loadDevOps().then(()=>renderProjDevOps());return}
  renderDevOpsInto(el,devopsData,null);
}

// ── DEVOPS ────────────────────────────────────────────────────
function sc(s){return STATE_COLORS[s]||'var(--text3)'}

function renderDevOpsInto(container,data,filter){
  const states=Object.keys(data.state_counts);
  const stateOrder=['Active','In Progress','Code Review','In Review','New','To Do','Blocked'];
  const sorted=[...stateOrder.filter(s=>states.includes(s)),...states.filter(s=>!stateOrder.includes(s))];
  const crCount=data.code_review.length;

  container.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:13px;font-weight:600;color:var(--text)">${data.total} active items</span>
      ${crCount>0?`<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--amber)">⚠ ${crCount} in code review</span>`:''}
    </div>
    <div class="state-tabs">
      <button class="state-tab ${filter==null?'active-tab':''}" onclick="filterDevOps(null,this)">All ${data.total}</button>
      ${sorted.map(s=>`<button class="state-tab ${filter===s?'active-tab':''}" onclick="filterDevOps('${s}',this)" style="${filter===s?`border-color:${sc(s)};background:${sc(s)}22;color:${sc(s)}`:''}">${s} <span style="opacity:.7">${data.state_counts[s]}</span></button>`).join('')}
    </div>
    <div id="devops-card-list" style="display:flex;flex-direction:column;gap:6px">
      ${renderCardList(filter?data.by_state[filter]||[]:data.items)}
    </div>`;
}

function renderCardList(items){
  if(!items.length)return'<div class="loading">No items</div>';
  return items.slice(0,50).map(item=>`
    <div class="devops-card" style="border-left-color:${sc(item.state)}">
      <div class="devops-card-title">${item.title}</div>
      <div class="devops-card-meta">
        <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)">${TYPE_ICONS[item.type]||'◻'} ${item.type}</span>
        <span class="devops-tag" style="background:${sc(item.state)}22;color:${sc(item.state)}">${item.state}</span>
        ${item.priority?`<span style="font-size:10px;font-family:'DM Mono',monospace;color:${item.priority<=1?'#D85A30':item.priority<=2?'#EF9F27':'var(--text3)'}">P${item.priority}</span>`:''}
        ${item.iteration?`<span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)">${item.iteration}</span>`:''}
        <span class="devops-id">#${item.id}</span>
      </div>
    </div>`).join('')+(items.length>50?`<div class="loading">+${items.length-50} more — filter by state</div>`:'');
}

function filterDevOps(state,btn){
  activeFilter=state;
  if(btn){
    document.querySelectorAll('.state-tab').forEach(b=>{b.classList.remove('active-tab');b.style.borderColor='';b.style.background='';b.style.color=''});
    btn.classList.add('active-tab');
    if(state){btn.style.borderColor=sc(state);btn.style.background=sc(state)+'22';btn.style.color=sc(state)}
  }
  const list=document.getElementById('devops-card-list');
  if(list&&devopsData)list.innerHTML=renderCardList(state?devopsData.by_state[state]||[]:devopsData.items);
}

async function loadDevOps(){
  try{
    const r=await fetch(API+'/devops');if(!r.ok)throw new Error('HTTP '+r.status);
    devopsData=await r.json();
    const st=document.getElementById('s-devops-total');if(st)st.textContent=devopsData.total;
    const sc2=document.getElementById('s-devops-cr');if(sc2)sc2.textContent=devopsData.code_review.length+' in review';
  }catch(e){console.warn('DevOps load failed:',e.message)}
}

// ── PROJECTS LIST ──────────────────────────────────────────────
async function loadProjects(){
  const el=document.getElementById('project-list');
  if(el)el.innerHTML='<div class="loading">loading...</div>';
  try{
    const r=await fetch(API+'/projects');const d=await r.json();
    allProjects=d.projects;
    if(!el)return;
    if(!allProjects.length){el.innerHTML='<div class="loading">No projects found</div>';return}
    el.innerHTML=allProjects.map(p=>`
      <div class="proj-card" data-id="${p.id}" onclick="openProject(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="proj-name">${p.name}</div>
        <div class="proj-meta">${p.decisions_count} decisions · ${p.owner}</div>
      </div>`).join('');
  }catch(e){if(el)el.innerHTML='<div class="error-msg">offline</div>'}
}

// ── DATA LOADERS ───────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  const el=document.getElementById('clock');if(el)el.textContent=now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Australia/Sydney'})+' AEST';
  const local=new Date(now.toLocaleString('en-US',{timeZone:'Australia/Sydney'}));
  const next=new Date(local);next.setHours(8,30,0,0);if(local>=next)next.setDate(next.getDate()+1);
  const diff=next-local;
  const sb=document.getElementById('s-briefing');if(sb)sb.textContent=Math.floor(diff/3600000)+'h '+Math.floor((diff%3600000)/60000)+'m';
}

async function loadStatus(){
  try{
    const r=await fetch(API+'/status');const d=await r.json();
    const sg=document.getElementById('s-gateway');if(sg)sg.textContent=d.gateway?'Live':'Down';
    const gd=document.getElementById('gw-dot');if(gd)gd.className='dot '+(d.gateway?'dot-green':'dot-red');
    const god=document.getElementById('google-dot');if(god)god.className='dot '+(d.google?'dot-green':'dot-amber');
    const sr=await fetch(API+'/gateway/status');const sd=await sr.json();
    const sl=document.getElementById('service-list');
    if(sl)sl.innerHTML=sd.services.map(s=>`
      <div class="svc-row">
        <div><div class="svc-name">${s.name}</div><div class="svc-detail">${s.detail}</div></div>
        <div class="pill ${s.online?'pill-on':'pill-off'}">${s.online?'on':'off'}</div>
      </div>`).join('');
  }catch(e){const sl=document.getElementById('service-list');if(sl)sl.innerHTML='<div class="error-msg">offline</div>'}
}

async function loadCalendar(){
  try{
    const r=await fetch(API+'/calendar/today');const d=await r.json();
    const cd=document.getElementById('cal-date');if(cd)cd.textContent=d.date||'';
    const sd=document.getElementById('s-date');if(sd)sd.textContent=(d.date||'').split(',')[0];
    const se=document.getElementById('s-events');if(se)se.textContent=d.events.length;
    const ce=document.getElementById('cal-events');if(!ce)return;
    if(!d.events.length){ce.innerHTML='<div class="loading">Clear today</div>';return}
    ce.innerHTML=d.events.map((ev,i)=>{
      const c=COLORS[i%COLORS.length];
      const meta=[ev.duration_min?ev.duration_min+'min':'',ev.meet_link?'Meet':'',ev.location||''].filter(Boolean).join(' · ');
      return`<div class="ev-card">
        <div class="ev-dot" style="background:${c}"></div>
        <div class="ev-time">${ev.time}</div>
        <div><div class="ev-title">${ev.title}</div>${meta?`<div class="ev-meta">${meta}</div>`:''}</div>
      </div>`;
    }).join('');
  }catch(e){const ce=document.getElementById('cal-events');if(ce)ce.innerHTML='<div class="error-msg">offline</div>'}
}

async function loadGmail(){
  try{
    const r=await fetch(API+'/gmail/unread');const d=await r.json();
    const su=document.getElementById('s-unread');if(su)su.textContent=d.total_unread||d.messages.length;
    const ml=document.getElementById('mail-list');if(!ml)return;
    if(!d.messages.length){ml.innerHTML='<div class="loading">Inbox clear</div>';return}
    ml.innerHTML=d.messages.map(m=>`
      <div class="mail-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <div class="mail-sender">${m.sender}</div>
          <div class="mail-time">${m.time}</div>
        </div>
        <div class="mail-subject">${m.subject}</div>
      </div>`).join('');
  }catch(e){const ml=document.getElementById('mail-list');if(ml)ml.innerHTML='<div class="error-msg">offline</div>'}
}

async function loadMemory(){
  try{
    const r=await fetch(API+'/memory');const d=await r.json();
    const mt=document.getElementById('memory-tags');if(!mt)return;
    if(!d.tags.length){mt.innerHTML='<div class="loading">No memory</div>';return}
    mt.innerHTML=d.tags.map(t=>`<div class="mem-tag">${t}</div>`).join('');
  }catch(e){const mt=document.getElementById('memory-tags');if(mt)mt.innerHTML='<div class="error-msg">offline</div>'}
}

// ── INIT ───────────────────────────────────────────────────────
updateClock(); setInterval(updateClock,30000);
loadStatus(); loadCalendar(); loadGmail(); loadMemory();
loadDevOps(); loadProjects();
setInterval(()=>{loadStatus();loadCalendar();loadGmail();},120000);
setInterval(loadDevOps,300000);
</script>
