<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#0d419d"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- broadcast arcs -->
  <g fill="none" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" opacity="0.95">
    <path d="M20.8 8.4a5.2 5.2 0 0 1 0 5.6"/>
    <path d="M11.2 8.4a5.2 5.2 0 0 0 0 5.6"/>
  </g>
  <!-- tower -->
  <g fill="#ffffff">
    <!-- beacon -->
    <circle cx="16" cy="6.7" r="1.7" fill="#7ee787"/>
    <!-- mast -->
    <rect x="15.2" y="8.1" width="1.6" height="3.2" rx="0.6"/>
    <!-- observation deck (overhanging cab) -->
    <path d="M9.4 12h13.2l-1.7 4.3H11.1z"/>
    <!-- shaft to base -->
    <path d="M12 16.3h8l-1.4 9.7H13.4z"/>
  </g>
</svg>
